<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>家庭内民事裁判所</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eceae4;
  --surface:#ffffff;
  --surface2:#f3f0ea;
  --border:rgba(0,0,0,0.08);
  --text:#1a1714;
  --text2:#4a4540;
  --text3:#8a8078;
  --amber-mid:#e8850a;
  --green-light:#22a85f;
  --red:#e24b4a;
  --sans:'Noto Sans JP',sans-serif;
  --mono:'Space Mono',monospace;
}
html,body{
  min-height:100vh;
  background:var(--bg);
  font-family:var(--sans);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
.page{
  max-width:390px;
  margin:0 auto;
  padding:0 16px 60px;
  min-height:100vh;
}
.screen{display:none}
.screen.active{display:block}

/* ヘッダー */
.header{
  padding:20px 0 24px;
  text-align:center;
}
.header-icon{font-size:36px;margin-bottom:6px}
.header-title{
  font-size:20px;font-weight:900;color:var(--text);
  letter-spacing:.02em;
}
.header-sub{
  font-size:12px;color:var(--text3);margin-top:4px;line-height:1.6;
}

/* ケース選択 */
.case-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;
}
.case-btn{
  padding:12px 8px;background:var(--surface);border:2px solid var(--border);
  border-radius:12px;font-size:13px;font-weight:700;color:var(--text2);
  font-family:var(--sans);cursor:pointer;text-align:center;transition:all .15s;
}
.case-btn.selected{
  border-color:var(--amber-mid);color:var(--amber-mid);background:#fff8ed;
}

/* テキストエリア */
.inp-label{
  font-size:12px;font-weight:700;color:var(--text3);margin-bottom:6px;
  letter-spacing:.04em;
}
textarea{
  width:100%;padding:12px 14px;background:var(--surface);
  border:1.5px solid var(--border);border-radius:12px;
  font-size:13px;font-family:var(--sans);color:var(--text);
  resize:none;outline:none;line-height:1.7;
  transition:border-color .15s;
}
textarea:focus{border-color:var(--amber-mid)}

/* ボタン */
.btn-primary{
  display:block;width:100%;padding:15px;
  background:var(--amber-mid);color:#fff;border:none;border-radius:14px;
  font-size:15px;font-weight:700;font-family:var(--sans);
  cursor:pointer;text-align:center;transition:opacity .15s,transform .1s;
  margin-top:16px;
}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-primary:disabled{opacity:.5;cursor:default}
.btn-secondary{
  display:block;width:100%;padding:14px;
  background:var(--surface);color:var(--text2);
  border:1.5px solid var(--border);border-radius:14px;
  font-size:14px;font-weight:700;font-family:var(--sans);
  cursor:pointer;text-align:center;margin-top:10px;
}

/* カード */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:16px;margin-bottom:12px;
}
.card-label{
  font-size:10px;font-weight:700;color:var(--text3);
  letter-spacing:.08em;margin-bottom:6px;
}
.card-content{
  font-size:13px;color:var(--text);line-height:1.75;
}

/* 法廷番号バッジ */
.court-badge{
  display:inline-block;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:5px 14px;
  font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text3);
  margin-bottom:20px;
}

/* 召喚状画面 */
.summon-title{
  font-size:22px;font-weight:900;color:var(--text);
  text-align:center;margin-bottom:20px;line-height:1.4;
}
.share-row{display:flex;gap:10px;margin-bottom:20px}
.btn-line{
  flex:1;padding:13px 8px;background:#06C755;color:#fff;border:none;
  border-radius:12px;font-size:13px;font-weight:700;font-family:var(--sans);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-copy{
  flex:1;padding:13px 8px;background:var(--surface);color:var(--text2);
  border:1.5px solid var(--border);border-radius:12px;
  font-size:13px;font-weight:700;font-family:var(--sans);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
}

/* 待機ステータス */
.status-waiting{
  text-align:center;padding:24px 16px;
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
}
.status-waiting-text{
  font-size:14px;font-weight:700;color:var(--text2);
}
.dots span{
  display:inline-block;animation:blink 1.2s infinite;font-size:18px;
  color:var(--amber-mid);
}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* 被告画面 */
.defendant-header{
  font-size:16px;font-weight:900;color:var(--red);
  text-align:center;margin-bottom:16px;padding:14px;
  background:#fff5f5;border:1.5px solid #fecaca;border-radius:12px;
}

/* 審議中画面 */
.deliberation-wrap{
  text-align:center;padding:40px 16px;
}
.gavel-icon{font-size:56px;margin-bottom:20px;animation:swing .8s ease-in-out infinite alternate}
@keyframes swing{from{transform:rotate(-15deg)}to{transform:rotate(15deg)}}
.deliberation-title{
  font-size:18px;font-weight:900;color:var(--text);margin-bottom:8px;
}

/* 判決画面 */
.verdict-seal{
  width:88px;height:88px;border-radius:50%;
  background:var(--red);display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  box-shadow:0 0 0 6px rgba(226,75,74,0.15);
}
.verdict-seal-text{
  font-size:22px;font-weight:900;color:#fff;letter-spacing:.1em;
  font-family:var(--mono);
}
.verdict-title{
  font-size:28px;font-weight:900;text-align:center;margin-bottom:24px;
  letter-spacing:.2em;color:var(--text);
}
.verdict-section-label{
  font-size:10px;font-weight:700;color:var(--red);letter-spacing:.1em;
  margin-bottom:8px;
}
.verdict-text{
  font-size:14px;line-height:1.8;color:var(--text);
}
.verdict-comment{
  font-size:13px;line-height:1.7;color:var(--text2);font-style:italic;
}

/* セクション区切り */
.section-gap{height:20px}
</style>
</head>
<body>

<div class="page">

  <!-- ① トップ画面 -->
  <div id="screen-top" class="screen">
    <div class="header">
      <div class="header-icon">⚖️</div>
      <div class="header-title">家庭内民事裁判所</div>
      <div class="header-sub">AI裁判長が、愛のある判決を下します</div>
    </div>

    <div class="inp-label">ケース種別</div>
    <div class="case-grid" id="case-grid">
      <button class="case-btn" onclick="selectCase(this,'夫婦ケンカ')">💑 夫婦ケンカ</button>
      <button class="case-btn" onclick="selectCase(this,'兄弟喧嘩')">👫 兄弟喧嘩</button>
      <button class="case-btn" onclick="selectCase(this,'親子問題')">👨‍👧 親子問題</button>
      <button class="case-btn" onclick="selectCase(this,'その他')">🤝 その他</button>
    </div>

    <div class="inp-label" style="margin-top:4px">原告の主張</div>
    <textarea id="plaintiff-claim-input" rows="5" placeholder="何があったか、正直に話してください"></textarea>

    <button class="btn-primary" onclick="submitCase()">⚖️ 提訴する</button>
  </div>

  <!-- ② 召喚状画面（原告） -->
  <div id="screen-plaintiff" class="screen">
    <div class="header">
      <div class="header-icon">📜</div>
    </div>
    <div style="text-align:center;margin-bottom:8px">
      <div class="court-badge" id="court-badge-plaintiff">第????号法廷</div>
    </div>
    <div class="summon-title">法廷が<br>開廷しました</div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-label">相手に送る召喚状</div>
      <div class="card-content" style="font-size:12px;color:var(--text3)">以下のボタンから相手を呼び出してください</div>
    </div>

    <div class="share-row">
      <button class="btn-line" id="btn-line-share" onclick="shareToLine()">
        <span style="font-size:18px">💬</span> LINEで召喚
      </button>
      <button class="btn-copy" id="btn-copy-url" onclick="copyUrl()">
        <span style="font-size:16px">📋</span> URLをコピー
      </button>
    </div>

    <div class="status-waiting">
      <div class="status-waiting-text">被告の入廷を待っています</div>
      <div class="dots" style="margin-top:8px">
        <span>●</span><span>●</span><span>●</span>
      </div>
    </div>
  </div>

  <!-- ③ 被告入廷画面 -->
  <div id="screen-defendant" class="screen">
    <div class="header" style="padding-bottom:12px">
      <div class="header-icon">🔴</div>
    </div>
    <div class="defendant-header">あなたは被告として召喚されました</div>

    <div class="card">
      <div class="card-label">原告の主張</div>
      <div class="card-content" id="plaintiff-claim-display">読み込み中...</div>
    </div>

    <div class="inp-label" style="margin-top:16px">あなたの反論</div>
    <textarea id="defendant-claim-input" rows="5" placeholder="あなたの言い分を話してください"></textarea>

    <button class="btn-primary" onclick="submitDefendant()">📝 反論を提出する</button>
  </div>

  <!-- ④ 審議中画面 -->
  <div id="screen-deliberation" class="screen">
    <div class="deliberation-wrap">
      <div class="gavel-icon">🔨</div>
      <div class="deliberation-title">AI裁判長が審議中です</div>
      <div class="dots">
        <span>●</span><span>●</span><span>●</span>
      </div>
      <div style="margin-top:20px;font-size:12px;color:var(--text3);line-height:1.7">
        両者の主張を精査しています<br>しばらくお待ちください
      </div>
    </div>
  </div>

  <!-- ⑤ 判決画面 -->
  <div id="screen-verdict" class="screen">
    <div style="padding-top:32px">
      <div class="verdict-seal"><div class="verdict-seal-text">判</div></div>
      <div class="verdict-title">判　決</div>

      <div class="card" style="margin-bottom:12px">
        <div class="verdict-section-label">主　文</div>
        <div class="verdict-text" id="verdict-main">読み込み中...</div>
      </div>

      <div class="card">
        <div class="verdict-section-label">裁判長のひとこと</div>
        <div class="verdict-comment" id="verdict-comment">...</div>
      </div>

      <div class="section-gap"></div>

      <div class="share-row">
        <button class="btn-line" onclick="shareVerdictToLine()">
          <span style="font-size:18px">💬</span> LINEで共有
        </button>
        <button class="btn-copy" onclick="copyVerdict()">
          <span style="font-size:16px">📋</span> コピー
        </button>
      </div>

      <button class="btn-secondary" onclick="location.href='saiban.html'">もう一度裁判する</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://qjffvspnnxyykoyhnazm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqZmZ2c3Bubnh5eWtveWhuYXptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMTIxMzMsImV4cCI6MjA4Njg4ODEzM30.OqeeMZs73RjKY5POW-naf0dB8sFWfZDUKaKvE99EiBo';
const CLAUDE_API_KEY = 'YOUR_CLAUDE_API_KEY_HERE';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const params = new URLSearchParams(window.location.search);
const roomId = params.get('room');
const role = params.get('role');

let selectedCase = '';
let pollTimer = null;
let claudeCalled = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function selectCase(el, val) {
  document.querySelectorAll('.case-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedCase = val;
}

async function submitCase() {
  if (!selectedCase) { alert('ケース種別を選んでください'); return; }
  const claim = document.getElementById('plaintiff-claim-input').value.trim();
  if (!claim) { alert('主張を入力してください'); return; }

  const id = String(Math.floor(1000 + Math.random() * 9000));
  const { error } = await sb.from('saiban_rooms').insert({
    id,
    case_type: selectedCase,
    plaintiff_claim: claim,
    status: 'waiting',
  });
  if (error) { alert('エラーが発生しました'); console.error(error); return; }
  window.location.href = 'saiban.html?room=' + id + '&role=plaintiff';
}

function getDefendantUrl() {
  return 'https://aipo-tau.vercel.app/saiban?room=' + roomId + '&role=defendant';
}

function shareToLine() {
  const text = encodeURIComponent(
    '【召喚状】\nあなたは第' + roomId + '号法廷に召喚されました。\n以下のリンクから入廷してください。\n\n' + getDefendantUrl()
  );
  window.open('https://line.me/R/msg/text/?' + text, '_blank');
}

function copyUrl() {
  navigator.clipboard.writeText(getDefendantUrl()).then(() => {
    const btn = document.getElementById('btn-copy-url');
    btn.textContent = '✅ コピー済み';
    setTimeout(() => { btn.innerHTML = '<span style="font-size:16px">📋</span> URLをコピー'; }, 2000);
  });
}

async function submitDefendant() {
  const claim = document.getElementById('defendant-claim-input').value.trim();
  if (!claim) { alert('反論を入力してください'); return; }

  const { error } = await sb.from('saiban_rooms')
    .update({ defendant_claim: claim, status: 'ready' })
    .eq('id', roomId);
  if (error) { alert('エラーが発生しました'); console.error(error); return; }
  window.location.href = 'saiban.html?room=' + roomId;
}

async function callClaude(caseType, plaintiffClaim, defendantClaim) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': CLAUDE_API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: `あなたは家庭内民事裁判所のAI裁判長です。以下の案件について判決を下してください。

ケース種別：${caseType}
原告の主張：${plaintiffClaim}
被告の主張：${defendantClaim}

以下のJSON形式のみで回答してください（他のテキスト不要）：
{
  "主文": "判決の内容（具体的な行動を命じる。家事の回数・謝罪の言葉など日常換算で。2〜3文）",
  "裁判長のひとこと": "愛のある一言（ユーモアを交えて。1文）"
}`
      }]
    })
  });
  const data = await response.json();
  const text = data.content[0].text;
  const json = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
  return json;
}

async function runDeliberation(room) {
  if (claudeCalled) return;
  claudeCalled = true;
  showScreen('deliberation');
  try {
    const verdict = await callClaude(room.case_type, room.plaintiff_claim, room.defendant_claim);
    const verdictJson = JSON.stringify(verdict);
    await sb.from('saiban_rooms').update({ verdict: verdictJson, status: 'judged' }).eq('id', roomId);
    showVerdictScreen(verdict);
  } catch (e) {
    console.error('Claude error:', e);
    alert('判決生成に失敗しました。もう一度お試しください。');
    claudeCalled = false;
  }
}

function showVerdictScreen(verdict) {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  document.getElementById('verdict-main').textContent = verdict['主文'] || '';
  document.getElementById('verdict-comment').textContent = verdict['裁判長のひとこと'] || '';
  showScreen('verdict');
}

function shareVerdictToLine() {
  const main = document.getElementById('verdict-main').textContent;
  const comment = document.getElementById('verdict-comment').textContent;
  const text = encodeURIComponent(
    '⚖️ 家庭内民事裁判所 判決\n\n【主文】\n' + main + '\n\n【裁判長のひとこと】\n' + comment +
    '\n\nhttps://aipo-tau.vercel.app/saiban'
  );
  window.open('https://line.me/R/msg/text/?' + text, '_blank');
}

function copyVerdict() {
  const main = document.getElementById('verdict-main').textContent;
  const comment = document.getElementById('verdict-comment').textContent;
  const text = '⚖️ 家庭内民事裁判所 判決\n\n【主文】\n' + main + '\n\n【裁判長のひとこと】\n' + comment;
  navigator.clipboard.writeText(text).then(() => alert('コピーしました'));
}

async function pollRoom(onReady, onJudged) {
  pollTimer = setInterval(async () => {
    const { data } = await sb.from('saiban_rooms').select('*').eq('id', roomId).single();
    if (!data) return;
    if (data.status === 'ready' && onReady) { onReady(data); }
    if (data.status === 'judged' && onJudged) {
      clearInterval(pollTimer);
      pollTimer = null;
      onJudged(data);
    }
  }, 3000);
}

async function init() {
  if (!roomId) {
    showScreen('top');
    return;
  }

  const { data: room, error } = await sb.from('saiban_rooms').select('*').eq('id', roomId).single();
  if (error || !room) { alert('法廷が見つかりません'); return; }

  if (role === 'plaintiff') {
    document.getElementById('court-badge-plaintiff').textContent = '第' + roomId + '号法廷';
    if (room.status === 'judged') {
      const v = JSON.parse(room.verdict);
      showVerdictScreen(v);
    } else if (room.status === 'ready') {
      runDeliberation(room);
    } else {
      showScreen('plaintiff');
      pollRoom(
        (r) => { runDeliberation(r); },
        (r) => { const v = JSON.parse(r.verdict); showVerdictScreen(v); }
      );
    }

  } else if (role === 'defendant') {
    if (room.status === 'judged') {
      const v = JSON.parse(room.verdict);
      showVerdictScreen(v);
    } else {
      document.getElementById('plaintiff-claim-display').textContent = room.plaintiff_claim;
      showScreen('defendant');
    }

  } else {
    if (room.status === 'judged') {
      const v = JSON.parse(room.verdict);
      showVerdictScreen(v);
    } else {
      showScreen('deliberation');
      pollRoom(
        null,
        (r) => { const v = JSON.parse(r.verdict); showVerdictScreen(v); }
      );
    }
  }
}

init();
</script>
</body>
</html>
