<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>家庭内民事裁判所</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ef;
  --surface:#ffffff;
  --border:rgba(0,0,0,0.10);
  --text:#1a1714;
  --text2:#5a5550;
  --text3:#9a9088;
  --accent:#1a1714;
  --accent-fg:#ffffff;
  --red:#c0392b;
  --gold:#b8860b;
  --serif:'Noto Serif JP',serif;
  --sans:'Noto Sans JP',sans-serif;
}
html,body{
  min-height:100vh;
  background:var(--bg);
  font-family:var(--serif);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
.page{
  max-width:560px;
  margin:0 auto;
  padding:0 24px 80px;
  min-height:100vh;
}
.screen{display:none}
.screen.active{display:block}

/* ── ロゴヘッダー ── */
.logo-area{
  padding:40px 0 36px;
  text-align:center;
  border-bottom:1px solid var(--border);
  margin-bottom:36px;
}
.logo-rule-top{
  width:40px;height:1px;background:var(--gold);
  margin:0 auto 18px;
}
.logo-title{
  font-family:var(--serif);font-size:24px;font-weight:600;
  color:var(--text);letter-spacing:.15em;
}
.logo-sub{
  font-family:var(--sans);font-size:11px;color:var(--text3);
  margin-top:8px;letter-spacing:.08em;
}
.logo-rule-bottom{
  width:40px;height:1px;background:var(--gold);
  margin:18px auto 0;
}

/* ── セクションラベル ── */
.inp-label{
  font-family:var(--sans);font-size:11px;font-weight:500;
  color:var(--text3);margin-bottom:8px;letter-spacing:.1em;
  text-transform:uppercase;
}

/* ── ケース選択 ── */
.case-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:28px;
}
.case-btn{
  padding:14px 10px;background:var(--surface);
  border:1px solid var(--border);border-radius:4px;
  font-family:var(--serif);font-size:14px;color:var(--text2);
  cursor:pointer;text-align:center;transition:all .15s;
  letter-spacing:.05em;
}
.case-btn:hover{border-color:var(--text3)}
.case-btn.selected{
  background:var(--accent);color:var(--accent-fg);
  border-color:var(--accent);
}

/* ── テキストエリア ── */
textarea{
  width:100%;padding:14px 16px;background:var(--surface);
  border:1px solid var(--border);border-radius:4px;
  font-size:14px;font-family:var(--serif);color:var(--text);
  resize:none;outline:none;line-height:1.8;
  transition:border-color .15s;
}
textarea:focus{border-color:var(--text)}
textarea::placeholder{color:var(--text3)}

/* ── ボタン ── */
.btn-primary{
  display:block;width:100%;padding:16px;
  background:var(--accent);color:var(--accent-fg);
  border:none;border-radius:4px;
  font-family:var(--serif);font-size:15px;font-weight:600;
  letter-spacing:.1em;cursor:pointer;text-align:center;
  transition:opacity .15s;margin-top:20px;
}
.btn-primary:hover{opacity:.85}
.btn-primary:active{opacity:.75}
.btn-primary:disabled{opacity:.4;cursor:default}
.btn-secondary{
  display:block;width:100%;padding:14px;
  background:transparent;color:var(--text2);
  border:1px solid var(--border);border-radius:4px;
  font-family:var(--serif);font-size:14px;
  cursor:pointer;text-align:center;margin-top:12px;
  transition:border-color .15s;
}
.btn-secondary:hover{border-color:var(--text3)}

/* ── 召喚状画面ヘッダー ── */
.summon-header{
  padding:40px 0 32px;
  text-align:center;
  border-bottom:1px solid var(--border);
  margin-bottom:32px;
}
.court-number{
  font-family:var(--sans);font-size:11px;font-weight:500;
  color:var(--gold);letter-spacing:.2em;margin-bottom:12px;
}
.summon-title{
  font-family:var(--serif);font-size:22px;font-weight:600;
  color:var(--text);letter-spacing:.1em;line-height:1.5;
}

/* ── シェアボタン ── */
.share-row{display:flex;gap:10px;margin-bottom:24px}
.btn-line{
  flex:1;padding:14px 10px;background:var(--accent);color:var(--accent-fg);
  border:none;border-radius:4px;
  font-family:var(--sans);font-size:13px;font-weight:500;
  cursor:pointer;text-align:center;letter-spacing:.04em;transition:opacity .15s;
}
.btn-line:hover{opacity:.85}
.btn-copy{
  flex:1;padding:14px 10px;background:var(--surface);color:var(--text2);
  border:1px solid var(--border);border-radius:4px;
  font-family:var(--sans);font-size:13px;font-weight:500;
  cursor:pointer;text-align:center;letter-spacing:.04em;transition:border-color .15s;
}
.btn-copy:hover{border-color:var(--text3)}

/* ── 待機ステータス ── */
.status-waiting{
  text-align:center;padding:32px 20px;
  border:1px solid var(--border);border-radius:4px;
  background:var(--surface);
}
.status-waiting-text{
  font-family:var(--sans);font-size:13px;color:var(--text3);
  letter-spacing:.06em;margin-bottom:16px;
}
.dots span{
  display:inline-block;
  width:6px;height:6px;border-radius:50%;
  background:var(--text3);margin:0 3px;
  animation:blink 1.2s infinite;
}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}

/* ── カード ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;padding:20px;margin-bottom:16px;
}
.card-label{
  font-family:var(--sans);font-size:10px;font-weight:500;
  color:var(--text3);letter-spacing:.12em;margin-bottom:10px;
}
.card-content{
  font-family:var(--serif);font-size:14px;color:var(--text);line-height:1.8;
}

/* ── 被告画面 ── */
.defendant-notice{
  border-left:3px solid var(--red);
  padding:14px 16px;margin-bottom:28px;background:var(--surface);
}
.defendant-notice-text{
  font-family:var(--sans);font-size:13px;font-weight:500;
  color:var(--red);letter-spacing:.04em;
}

/* ── 審議中画面 ── */
.deliberation-wrap{
  text-align:center;padding:80px 20px 60px;
}
.spinner{
  width:40px;height:40px;border:2px solid var(--border);
  border-top-color:var(--text);border-radius:50%;
  margin:0 auto 28px;animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.deliberation-rule{
  width:24px;height:1px;background:var(--gold);margin:0 auto 20px;
}
.deliberation-title{
  font-family:var(--serif);font-size:18px;font-weight:600;
  color:var(--text);letter-spacing:.1em;margin-bottom:12px;
}
.deliberation-sub{
  font-family:var(--sans);font-size:12px;color:var(--text3);
  line-height:1.8;letter-spacing:.04em;
}

/* ── 判決画面 ── */
.verdict-header{
  padding:48px 0 36px;
  text-align:center;
  border-bottom:1px solid var(--border);
  margin-bottom:36px;
}
.verdict-rule-top{
  width:24px;height:1px;background:var(--gold);margin:0 auto 20px;
}
.verdict-title{
  font-family:var(--serif);font-size:32px;font-weight:600;
  color:var(--text);letter-spacing:.3em;
}
.verdict-rule-bottom{
  width:24px;height:1px;background:var(--gold);margin:20px auto 0;
}

.verdict-shumon{
  border:1.5px solid var(--red);border-radius:4px;
  padding:20px;margin-bottom:16px;
}
.verdict-shumon-label{
  font-family:var(--sans);font-size:10px;font-weight:500;
  color:var(--red);letter-spacing:.15em;margin-bottom:12px;
}
.verdict-text{
  font-family:var(--serif);font-size:15px;line-height:1.9;color:var(--text);
}

.verdict-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;padding:20px;margin-bottom:16px;
}
.verdict-comment-label{
  font-family:var(--sans);font-size:10px;font-weight:500;
  color:var(--text3);letter-spacing:.12em;margin-bottom:10px;
}
.verdict-comment{
  font-family:var(--serif);font-size:13px;line-height:1.8;
  color:var(--text2);font-style:italic;
}

.section-gap{height:28px}
.section-divider{
  height:1px;background:var(--border);margin:28px 0;
}
</style>
</head>
<body>

<div class="page">

  <!-- ① トップ画面 -->
  <div id="screen-top" class="screen">
    <div class="logo-area">
      <div class="logo-rule-top"></div>
      <div class="logo-title">家庭内民事裁判所</div>
      <div class="logo-sub">令和7年 · AI裁判長制度</div>
      <div class="logo-rule-bottom"></div>
    </div>

    <div class="inp-label">事件の種別</div>
    <div class="case-grid" id="case-grid">
      <button class="case-btn" onclick="selectCase(this,'夫婦ケンカ')">夫婦間</button>
      <button class="case-btn" onclick="selectCase(this,'兄弟喧嘩')">兄弟・姉妹間</button>
      <button class="case-btn" onclick="selectCase(this,'親子問題')">親子間</button>
      <button class="case-btn" onclick="selectCase(this,'その他')">その他</button>
    </div>

    <div class="inp-label">訴　状</div>
    <textarea id="plaintiff-claim-input" rows="6" placeholder="事の経緯を詳細にご記入ください"></textarea>

    <button class="btn-primary" onclick="submitCase()">提訴する</button>
  </div>

  <!-- ② 召喚状画面（原告） -->
  <div id="screen-plaintiff" class="screen">
    <div class="summon-header">
      <div class="court-number" id="court-badge-plaintiff">第 ???? 号法廷</div>
      <div class="summon-title">法廷が開廷しました</div>
    </div>

    <div class="inp-label" style="margin-bottom:12px">相手方への召喚状</div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-content" style="font-size:13px;color:var(--text3);line-height:1.7">
        以下のボタンから相手方を呼び出してください。<br>被告が入廷すると自動で次の手続きに進みます。
      </div>
    </div>

    <div class="share-row">
      <button class="btn-line" id="btn-line-share" onclick="shareToLine()">LINE で召喚状を送る</button>
      <button class="btn-copy" id="btn-copy-url" onclick="copyUrl()">リンクをコピー</button>
    </div>

    <div class="status-waiting">
      <div class="status-waiting-text">被告の入廷を待っています</div>
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- ③ 被告入廷画面 -->
  <div id="screen-defendant" class="screen">
    <div class="logo-area">
      <div class="logo-rule-top"></div>
      <div class="logo-title">家庭内民事裁判所</div>
      <div class="logo-sub">令和7年 · AI裁判長制度</div>
      <div class="logo-rule-bottom"></div>
    </div>

    <div class="defendant-notice">
      <div class="defendant-notice-text">あなたは被告として召喚されました</div>
    </div>

    <div class="inp-label" style="margin-bottom:10px">原告の主張</div>
    <div class="card" style="margin-bottom:28px">
      <div class="card-content" id="plaintiff-claim-display">読み込み中...</div>
    </div>

    <div class="inp-label">答　弁</div>
    <textarea id="defendant-claim-input" rows="6" placeholder="あなたの言い分を話してください"></textarea>

    <button class="btn-primary" onclick="submitDefendant()">反論を提出する</button>
  </div>

  <!-- ④ 審議中画面 -->
  <div id="screen-deliberation" class="screen">
    <div class="deliberation-wrap">
      <div class="spinner"></div>
      <div class="deliberation-rule"></div>
      <div class="deliberation-title">AI裁判長が審議中です</div>
      <div class="deliberation-sub">両者の主張を精査しています<br>しばらくお待ちください</div>
    </div>
  </div>

  <!-- ⑤ 判決画面 -->
  <div id="screen-verdict" class="screen">
    <div class="verdict-header">
      <div class="verdict-rule-top"></div>
      <div class="verdict-title">判　決</div>
      <div class="verdict-rule-bottom"></div>
    </div>

    <div class="verdict-shumon">
      <div class="verdict-shumon-label">主　文</div>
      <div class="verdict-text" id="verdict-main">読み込み中...</div>
    </div>

    <div class="verdict-card">
      <div class="verdict-comment-label">裁判長のひとこと</div>
      <div class="verdict-comment" id="verdict-comment">...</div>
    </div>

    <div class="section-gap"></div>

    <div class="share-row">
      <button class="btn-line" onclick="shareVerdictToLine()">LINE で共有する</button>
      <button class="btn-copy" onclick="copyVerdict()">判決文をコピー</button>
    </div>

    <button class="btn-secondary" onclick="location.href='saiban.html'">もう一度裁判する</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://qjffvspnnxyykoyhnazm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqZmZ2c3Bubnh5eWtveWhuYXptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMTIxMzMsImV4cCI6MjA4Njg4ODEzM30.OqeeMZs73RjKY5POW-naf0dB8sFWfZDUKaKvE99EiBo';
const CLAUDE_API_KEY = 'YOUR_CLAUDE_API_KEY_HERE';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const params = new URLSearchParams(window.location.search);
const roomId = params.get('room');
const role = params.get('role');

let selectedCase = '';
let pollTimer = null;
let claudeCalled = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function selectCase(el, val) {
  document.querySelectorAll('.case-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedCase = val;
}

async function submitCase() {
  if (!selectedCase) { alert('ケース種別を選んでください'); return; }
  const claim = document.getElementById('plaintiff-claim-input').value.trim();
  if (!claim) { alert('主張を入力してください'); return; }

  const id = String(Math.floor(1000 + Math.random() * 9000));
  const { error } = await sb.from('saiban_rooms').insert({
    id,
    case_type: selectedCase,
    plaintiff_claim: claim,
    status: 'waiting',
  });
  if (error) { alert('エラーが発生しました'); console.error(error); return; }
  window.location.href = 'saiban.html?room=' + id + '&role=plaintiff';
}

function getDefendantUrl() {
  return 'https://aipo-tau.vercel.app/saiban?room=' + roomId + '&role=defendant';
}

function shareToLine() {
  const text = encodeURIComponent(
    '【召喚状】\nあなたは第' + roomId + '号法廷に召喚されました。\n以下のリンクから入廷してください。\n\n' + getDefendantUrl()
  );
  window.open('https://line.me/R/msg/text/?' + text, '_blank');
}

function copyUrl() {
  navigator.clipboard.writeText(getDefendantUrl()).then(() => {
    const btn = document.getElementById('btn-copy-url');
    btn.textContent = 'コピーしました';
    setTimeout(() => { btn.textContent = 'リンクをコピー'; }, 2000);
  });
}

async function submitDefendant() {
  const claim = document.getElementById('defendant-claim-input').value.trim();
  if (!claim) { alert('反論を入力してください'); return; }

  const { error } = await sb.from('saiban_rooms')
    .update({ defendant_claim: claim, status: 'ready' })
    .eq('id', roomId);
  if (error) { alert('エラーが発生しました'); console.error(error); return; }
  window.location.href = 'saiban.html?room=' + roomId;
}

async function callClaude(caseType, plaintiffClaim, defendantClaim) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': CLAUDE_API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: `あなたは家庭内民事裁判所のAI裁判長です。以下の案件について判決を下してください。

ケース種別：${caseType}
原告の主張：${plaintiffClaim}
被告の主張：${defendantClaim}

以下のJSON形式のみで回答してください（他のテキスト不要）：
{
  "主文": "判決の内容（具体的な行動を命じる。家事の回数・謝罪の言葉など日常換算で。2〜3文）",
  "裁判長のひとこと": "愛のある一言（ユーモアを交えて。1文）"
}`
      }]
    })
  });
  const data = await response.json();
  const text = data.content[0].text;
  const json = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
  return json;
}

async function runDeliberation(room) {
  if (claudeCalled) return;
  claudeCalled = true;
  showScreen('deliberation');
  try {
    const verdict = await callClaude(room.case_type, room.plaintiff_claim, room.defendant_claim);
    const verdictJson = JSON.stringify(verdict);
    await sb.from('saiban_rooms').update({ verdict: verdictJson, status: 'judged' }).eq('id', roomId);
    showVerdictScreen(verdict);
  } catch (e) {
    console.error('Claude error:', e);
    alert('判決生成に失敗しました。もう一度お試しください。');
    claudeCalled = false;
  }
}

function showVerdictScreen(verdict) {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  document.getElementById('verdict-main').textContent = verdict['主文'] || '';
  document.getElementById('verdict-comment').textContent = verdict['裁判長のひとこと'] || '';
  showScreen('verdict');
}

function shareVerdictToLine() {
  const main = document.getElementById('verdict-main').textContent;
  const comment = document.getElementById('verdict-comment').textContent;
  const text = encodeURIComponent(
    '家庭内民事裁判所 判決\n\n【主文】\n' + main + '\n\n【裁判長のひとこと】\n' + comment +
    '\n\nhttps://aipo-tau.vercel.app/saiban'
  );
  window.open('https://line.me/R/msg/text/?' + text, '_blank');
}

function copyVerdict() {
  const main = document.getElementById('verdict-main').textContent;
  const comment = document.getElementById('verdict-comment').textContent;
  const text = '家庭内民事裁判所 判決\n\n【主文】\n' + main + '\n\n【裁判長のひとこと】\n' + comment;
  navigator.clipboard.writeText(text).then(() => alert('コピーしました'));
}

async function pollRoom(onReady, onJudged) {
  pollTimer = setInterval(async () => {
    const { data } = await sb.from('saiban_rooms').select('*').eq('id', roomId).single();
    if (!data) return;
    if (data.status === 'ready' && onReady) { onReady(data); }
    if (data.status === 'judged' && onJudged) {
      clearInterval(pollTimer);
      pollTimer = null;
      onJudged(data);
    }
  }, 3000);
}

async function init() {
  if (!roomId) {
    showScreen('top');
    return;
  }

  const { data: room, error } = await sb.from('saiban_rooms').select('*').eq('id', roomId).single();
  if (error || !room) { alert('法廷が見つかりません'); return; }

  if (role === 'plaintiff') {
    document.getElementById('court-badge-plaintiff').textContent = '第 ' + roomId + ' 号法廷';
    if (room.status === 'judged') {
      const v = JSON.parse(room.verdict);
      showVerdictScreen(v);
    } else if (room.status === 'ready') {
      runDeliberation(room);
    } else {
      showScreen('plaintiff');
      pollRoom(
        (r) => { runDeliberation(r); },
        (r) => { const v = JSON.parse(r.verdict); showVerdictScreen(v); }
      );
    }

  } else if (role === 'defendant') {
    if (room.status === 'judged') {
      const v = JSON.parse(room.verdict);
      showVerdictScreen(v);
    } else {
      document.getElementById('plaintiff-claim-display').textContent = room.plaintiff_claim;
      showScreen('defendant');
    }

  } else {
    if (room.status === 'judged') {
      const v = JSON.parse(room.verdict);
      showVerdictScreen(v);
    } else {
      showScreen('deliberation');
      pollRoom(
        null,
        (r) => { const v = JSON.parse(r.verdict); showVerdictScreen(v); }
      );
    }
  }
}

init();
</script>
</body>
</html>
