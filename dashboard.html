<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AIPO CONTROL TOWER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber-mid: #e8850a;
    --amber-light: #f5a623;
    --surface: #ffffff;
    --bg: #eceae4;
    --green-light: #22a85f;
    --red: #e53e3e;
    --text: #1a1a1a;
    --text-muted: #888;
  }

  html, body {
    width: 100%;
    max-width: 390px;
    margin: 0 auto;
    overflow-x: hidden;
    background: var(--bg);
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header & Tab bar ── */
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    max-width: 390px;
    width: 100%;
  }
  .header {
    background: linear-gradient(135deg, #c96a00 0%, var(--amber-mid) 50%, var(--amber-light) 100%);
    color: #fff;
    padding: 12px 16px 10px;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .header-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .last-updated {
    font-size: 10px;
    opacity: 0.85;
    font-family: 'Space Mono', monospace;
  }
  .refresh-btn {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .refresh-btn:active { background: rgba(255,255,255,0.35); }
  .header-back {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    text-decoration: none;
  }

  .tab-bar {
    background: var(--surface);
    border-bottom: 1px solid #e0ddd6;
    display: flex;
  }
  .tab-btn {
    flex: 1;
    padding: 11px 4px 9px;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: color .15s, border-color .15s;
    position: relative;
  }
  .tab-btn.active { color: var(--amber-mid); border-bottom-color: var(--amber-mid); }
  .tab-unread-dot {
    position: absolute;
    top: 6px; right: calc(50% - 20px);
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    display: none;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── Layout ── */
  .main {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .card {
    background: var(--surface);
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 14px;
  }

  /* ── KPI ── */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .kpi-card {
    background: var(--surface);
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 12px;
    border-top: 3px solid var(--amber-mid);
    min-width: 0;
  }
  .kpi-value {
    font-family: 'Space Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .kpi-label { font-size: 11px; color: var(--text-muted); line-height: 1.3; }
  .kpi-sub { font-size: 10px; color: var(--amber-mid); margin-top: 3px; font-family: 'Space Mono', monospace; }

  /* ── Skeleton ── */
  .skeleton, .skeleton-line {
    background: linear-gradient(90deg, #e8e6e0 25%, #f0ede8 50%, #e8e6e0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
    display: block;
  }
  .skeleton { height: 28px; width: 60%; }
  .skeleton-line { height: 14px; margin-bottom: 10px; }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Rank ── */
  .rank-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f0ede8; }
  .rank-item:last-child { border-bottom: none; }
  .rank-badge { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: #e8e6e0; color: var(--text-muted); }
  .rank-badge.gold { background: var(--amber-mid); color: #fff; }
  .rank-badge.silver { background: #aaa; color: #fff; }
  .rank-badge.bronze { background: #a07040; color: #fff; }
  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .rank-score { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: var(--amber-mid); flex-shrink: 0; }

  /* ── Gauge ── */
  .gauge-labels { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; }
  .gauge-count { font-family: 'Space Mono', monospace; font-weight: 700; }
  .gauge-remaining { color: var(--text-muted); }
  .gauge-warning { color: var(--red); font-weight: 700; }
  .gauge-bar-bg { background: #e8e6e0; border-radius: 6px; height: 14px; overflow: hidden; }
  .gauge-bar-fill { height: 100%; background: linear-gradient(90deg, #c96a00, var(--amber-light)); border-radius: 6px; transition: width 0.6s ease; }

  /* ── Activity ── */
  .activity-item { display: flex; gap: 8px; padding: 7px 0; border-bottom: 1px solid #f0ede8; align-items: flex-start; }
  .activity-item:last-child { border-bottom: none; }
  .activity-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .activity-body { flex: 1; min-width: 0; }
  .activity-text { font-size: 12px; line-height: 1.5; }
  .activity-user { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--amber-mid); }
  .activity-idea { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px; display: inline-block; vertical-align: bottom; }
  .activity-time { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .error-text { color: var(--red); font-size: 12px; }

  /* ── AI Action Card ── */
  .action-card { background: linear-gradient(135deg, #c96a00 0%, var(--amber-mid) 100%); border-radius: 14px; padding: 16px; color: #fff; box-shadow: 0 4px 16px rgba(232,133,10,0.3); }
  .action-priority { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; margin-bottom: 8px; opacity: 0.9; font-family: 'Space Mono', monospace; }
  .action-label { font-size: 10px; opacity: 0.75; margin-bottom: 4px; letter-spacing: 0.5px; }
  .action-main { font-size: 15px; font-weight: 700; line-height: 1.45; margin-bottom: 10px; }
  .action-reason { font-size: 12px; opacity: 0.88; line-height: 1.65; background: rgba(0,0,0,0.12); border-radius: 8px; padding: 8px 10px; }
  .action-cta { margin-top: 12px; background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.4); color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; width: 100%; text-align: center; }

  /* ── AI Comment ── */
  .ai-comment { background: #f5f3ef; border-radius: 10px; padding: 10px 12px; font-size: 12px; color: #555; line-height: 1.75; margin-top: 12px; border-left: 3px solid var(--amber-mid); }

  /* ── Funnel ── */
  .funnel-step { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid #f0ede8; }
  .funnel-step:last-child { border-bottom: none; }
  .funnel-num { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; min-width: 48px; }
  .funnel-label { font-size: 12px; color: var(--text-muted); flex: 1; }
  .funnel-rate { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; color: var(--amber-mid); text-align: right; min-width: 70px; }
  .funnel-rate.danger { color: var(--red); }
  .funnel-arrow { text-align: center; color: var(--text-muted); font-size: 11px; padding: 1px 0 1px 56px; }
  .warn-badge { font-size: 10px; color: var(--red); font-weight: 700; display: block; margin-top: 1px; }

  /* ── Retention ── */
  .retention-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .ret-card { background: #f5f3ef; border-radius: 10px; padding: 10px 6px; text-align: center; }
  .ret-value { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .ret-label { font-size: 10px; color: var(--text-muted); line-height: 1.4; }

  /* ── Health ── */
  .health-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .health-card { border-radius: 10px; padding: 10px 8px; text-align: center; }
  .health-card.critical { background: #fff0f0; }
  .health-card.warning  { background: #fffbf0; }
  .health-card.healthy  { background: #f0fff5; }
  .health-num { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
  .health-card.critical .health-num { color: var(--red); }
  .health-card.warning  .health-num { color: #d97706; }
  .health-card.healthy  .health-num { color: var(--green-light); }
  .health-label { font-size: 10px; color: var(--text-muted); }
  .risk-item { padding: 8px 0; border-bottom: 1px solid #f0ede8; }
  .risk-item:last-child { border-bottom: none; }
  .risk-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .risk-name { font-size: 12px; font-weight: 500; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1; }
  .risk-meta { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .risk-link { font-size: 11px; color: var(--amber-mid); text-decoration: none; flex-shrink: 0; font-weight: 700; }

  /* ── Revenue ── */
  .rev-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .rev-card { background: #f5f3ef; border-radius: 10px; padding: 12px; min-width: 0; }
  .rev-value { font-family: 'Space Mono', monospace; font-size: 17px; font-weight: 700; color: var(--amber-mid); line-height: 1; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rev-label { font-size: 10px; color: var(--text-muted); line-height: 1.5; }

  /* ── User list ── */
  .user-card {
    background: var(--surface);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    cursor: pointer;
    transition: background .1s;
  }
  .user-card:active { background: #f5f3ef; }

  /* ── User detail modal ── */
  #user-detail-modal {
    display: none;
    position: fixed;
    inset: 0;
    max-width: 390px;
    margin: 0 auto;
    z-index: 200;
    background: var(--bg);
    overflow-y: auto;
    overflow-x: hidden;
  }
  .detail-header {
    background: var(--surface);
    border-bottom: 0.5px solid #e0ddd6;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .detail-back-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    color: var(--text);
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #f0ede8;
    font-size: 13px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--text-muted); font-size: 12px; }

  /* ── Chat / Messages ── */
  .msg-list {
    padding: 12px 14px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .msg-form {
    background: var(--surface);
    border-top: 0.5px solid #e0ddd6;
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    position: sticky;
    bottom: 0;
  }
  .msg-input {
    flex: 1;
    border: 1.5px solid #e0ddd6;
    border-radius: 10px;
    padding: 9px 12px;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    background: #f5f3ef;
    color: var(--text);
    resize: none;
    outline: none;
    max-height: 80px;
    overflow-y: auto;
    line-height: 1.5;
  }
  .msg-send-btn {
    background: var(--amber-mid);
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    flex-shrink: 0;
  }

  /* ── Log tab ── */
  .log-filters {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid #e0ddd6;
    background: var(--surface);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all .15s;
  }
  .filter-btn.active {
    background: var(--amber-mid);
    border-color: var(--amber-mid);
    color: #fff;
  }

  /* ── Toast ── */
  .dash-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.82);
    color: #fff;
    padding: 9px 20px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity .22s, transform .22s;
    z-index: 9999;
    white-space: nowrap;
    max-width: 300px;
    text-align: center;
  }
  .dash-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .footer { padding: 20px 16px; text-align: center; }
  .footer a { font-size: 13px; color: var(--amber-mid); text-decoration: none; }
</style>
</head>

      <div>

    <div>
      <div class="section-title">収益予測</div>
      <div class="card"><div id="revenue-content"><span class="skeleton-line" style="width:100%"></span><span class="skeleton-line" style="width:80%"></span></div></div>

  </div>
  <div class="footer"><a href="index.html">← あいぽに戻る</a></div>

<div class="tab-content" id="tab-1">
  <div class="main">
    <div>
      <div class="section-title">ユーザー一覧</div>
      <div id="user-list-body"><span class="skeleton-line" style="width:100%"></span><span class="skeleton-line" style="width:90%"></span><span class="skeleton-line" style="width:80%"></span></div>

<!-- ══ Tab 2: ログ ══════════════════════════════════════ -->
<div class="tab-content" id="tab-2">
  <div class="main">
    <div>
      <div class="section-title">活動ログ（最大50件）</div>

function relativeTime(iso) {
  const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);

async function loadRetention() {
  const el = document.getElementById('retention-content');
  try {
    const { data: allVotes } = await sb.from('votes').select('user_id,created_at').limit(10000);
    if (!allVotes || allVotes.length===0) { el.innerHTML='<div style="color:var(--text-muted);font-size:12px">投票データなし</div>'; return {retentionRate:0}; }
    const userMap = {};
    allVotes.forEach(v => { if(!userMap[v.user_id]) userMap[v.user_id]=[]; userMap[v.user_id].push(new Date(v.created_at).getTime()); });
    let repeaters=0, within7=0, totalReturn=0, returnCount=0;
    Object.values(userMap).forEach(times => {
      times.sort((a,b)=>a-b);
      if (times.length>=2) {
        repeaters++;
        const days=(times[1]-times[0])/86400000;
        totalReturn+=days; returnCount++;
        if (days<=7) within7++;
      }
    });
    const totalVoters = Object.keys(userMap).length;
    const retentionRate = totalVoters>0?Math.round(repeaters/totalVoters*100):0;
    const within7Rate = repeaters>0?Math.round(within7/repeaters*100):0;
    const avgDays = returnCount>0?(totalReturn/returnCount).toFixed(1):'—';
    el.innerHTML =
      '<div class="retention-grid">'
      +'<div class="ret-card"><div class="ret-value">'+avgDays+'</div><div class="ret-label">平均リターン<br>日数</div></div>'
      +'<div class="ret-card"><div class="ret-value">'+retentionRate+'%</div><div class="ret-label">リピーター<br>率</div></div>'
      +'<div class="ret-card"><div class="ret-value">'+within7Rate+'%</div><div class="ret-label">7日以内<br>リピート率</div></div>'
      +'</div>'
      +'<div class="ai-comment">🤖 '+(retentionRate<40?'1回投票して終わるユーザーが多い状態です。投票後の配当・目利きスコアの通知を強化してください。':parseFloat(avgDays)>7?'1週間以上帰ってこないユーザーが多い。週次のメール通知やXでのランキング発表が効果的です。':'リテンションは良好です。このユーザー体験を新規にも提供することが優先課題です。')+'</div>';
    return { retentionRate };
  } catch(e) { el.innerHTML='<span class="error-text">データ取得中...</span>'; return {retentionRate:0}; }
}

async function loadHealth() {
  const el = document.getElementById('health-content');
  try {
    const { data: allIdeas } = await sb.from('ideas').select('id,name,emoji,score,votes,updated_at,created_at').order('score',{ascending:true}).limit(200);
    if (!allIdeas||allIdeas.length===0) { el.innerHTML='<div style="color:var(--text-muted);font-size:12px">アイデアなし</div>'; return {criticalIdeas:0}; }
    function risk(idea) {
      const days=(Date.now()-new Date(idea.updated_at||idea.created_at))/86400000;
      if (days>14&&(idea.votes||0)<5) return 'critical';
      if (days>7&&(idea.votes||0)<10) return 'warning';
      if ((idea.score||0)<30) return 'warning';
      return 'healthy';
    }
    let critical=[], warning=[], healthy=[];
    allIdeas.forEach(i => { const r=risk(i); if(r==='critical') critical.push(i); else if(r==='warning') warning.push(i); else healthy.push(i); });
    let html =
      '<div class="health-summary">'
      +'<div class="health-card critical"><div class="health-num">'+critical.length+'</div><div class="health-label">🔴 危険</div></div>'
      +'<div class="health-card warning"><div class="health-num">'+warning.length+'</div><div class="health-label">🟡 注意</div></div>'
      +'<div class="health-card healthy"><div class="health-num">'+healthy.length+'</div><div class="health-label">🟢 健全</div></div>'
      +'</div>';
    if (critical.length>0) {
      html += '<div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:6px">危険アイデア（最大5件）</div>';
      critical.slice(0,5).forEach(idea => {
        const days=Math.floor((Date.now()-new Date(idea.updated_at||idea.created_at))/86400000);
        html+='<div class="risk-item"><div class="risk-row"><div class="risk-name">'+esc(idea.emoji||'')+' '+esc(idea.name||'—')+'</div><a href="index.html" class="risk-link">→ 見る</a></div><div class="risk-meta">最終更新 '+days+'日前 · '+parseFloat(idea.score||0).toFixed(1)+'pt · 👍'+(idea.votes||0)+'票</div></div>';
      });
    }
    html += '<div class="ai-comment">🤖 '+(critical.length>=3?'複数のアイデアが死滅リスクにあります。Xで注目アイデアとして紹介し、投票を促してください。':critical.length===0?'全アイデアが活発な状態です。新規アイデアの流入を増やすタイミングです。':critical.length+'件のアイデアが危険な状態です。個別に投票を促す施策を検討してください。')+'</div>';
    el.innerHTML = html;
    return { criticalIdeas: critical.length };
  } catch(e) { el.innerHTML='<span class="error-text">データ取得中...</span>'; return {criticalIdeas:0}; }
}

    const dot = document.getElementById('dot-1');
    if (dot) dot.style.display = hasUnread ? 'block' : 'none';

    if (profiles.length===0) { el.innerHTML='<div style="color:var(--text-muted);font-size:13px;padding:12px 0">ユーザーなし</div>'; return; }
    el.innerHTML = profiles.map(p => {
      const uname = p.x_username ? '@'+p.x_username : '匿名';
      const join = p.created_at ? new Date(p.created_at).toLocaleDateString('ja-JP') : '—';
      const vc = voteMap[p.id]||0;
      const last = lastVoteMap[p.id] ? relativeTime(lastVoteMap[p.id]) : '—';
      const badges = [];
      if (p.is_founder) badges.push('<span style="font-size:10px;font-weight:700;color:var(--amber-mid);background:#fff8ee;border:1px solid #f0c36a;border-radius:4px;padding:1px 6px">👑 #'+String(p.founder_number||0).padStart(2,'0')+'</span>');
      if (p.is_pro) badges.push('<span style="font-size:10px;font-weight:700;color:#fff;background:var(--green-light);border-radius:4px;padding:1px 6px">Pro</span>');
      const hasMsg = unreadSet.has(p.id);
      return '<div class="user-card" onclick="openUserDetail(\''+p.id+'\')">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
        +'<div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(uname)+'</div>'
        +(hasMsg?'<span style="min-width:8px;height:8px;background:var(--red);border-radius:50%;flex-shrink:0;margin-left:6px;display:block"></span>':'')
        +'</div>'
        +'<div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">入会：'+join+'</div>'
        +'<div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">投票：'+vc+'回 ｜ 最終：'+last+'</div>'
        +(badges.length?'<div style="display:flex;gap:4px;flex-wrap:wrap">'+badges.join('')+'</div>':'')
        +'</div>';
    }).join('');
  } catch(e) { el.innerHTML='<span class="error-text">取得失敗</span>'; }
}

let msgSub = null;
let currentDetailUserId = null;

async function openUserDetail(userId) {
  currentDetailUserId = userId;
  const modal = document.getElementById('user-detail-modal');
  modal.style.display = 'block';
  document.getElementById('user-detail-body').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted)">読み込み中...</div>';
  document.getElementById('user-messages-body').innerHTML = '';

  try {
    const [profRes, vcRes, ccRes, lvRes, lcRes] = await Promise.all([
      sb.from('profiles').select('*').eq('id',userId).single(),
      sb.from('votes').select('id',{count:'exact',head:true}).eq('user_id',userId),
      sb.from('comments').select('id',{count:'exact',head:true}).eq('user_id',userId),
      sb.from('votes').select('idea_id,created_at,ideas(name)').eq('user_id',userId).order('created_at',{ascending:false}).limit(5),
      sb.from('comments').select('idea_id,created_at,ideas(name)').eq('user_id',userId).order('created_at',{ascending:false}).limit(5),
    ]);
    const p = profRes.data;
    const vc = vcRes.count||0, cc = ccRes.count||0;
    const uname = p?.x_username ? '@'+p.x_username : '匿名';
    setText('user-detail-name', uname);

    const activity = [];
    (lvRes.data||[]).forEach(v => activity.push({type:'vote',   name:v.ideas?.name||v.idea_id,  created_at:v.created_at}));
    (lcRes.data||[]).forEach(c => activity.push({type:'comment', name:c.ideas?.name||c.idea_id, created_at:c.created_at}));
    activity.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

    let html = '<div style="background:var(--surface);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.06)">'
      +'<div style="font-size:17px;font-weight:700;margin-bottom:6px">'+esc(uname)+'</div>'
      +(p?.is_founder?'<div style="font-size:12px;color:var(--amber-mid);font-weight:700;margin-bottom:8px">👑 創設メンバー #'+String(p.founder_number||0).padStart(2,'0')+'</div>':'')
      +(p?.is_pro?'<div style="display:inline-block;font-size:11px;font-weight:700;color:#fff;background:var(--green-light);border-radius:4px;padding:2px 8px;margin-bottom:8px">Pro</div>':'')
      +'<div class="detail-row"><span class="detail-label">入会日</span><span>'+(p?.created_at?new Date(p.created_at).toLocaleDateString('ja-JP'):'—')+'</span></div>'
      +'<div class="detail-row"><span class="detail-label">総投票数</span><span>'+vc+'回</span></div>'
      +'<div class="detail-row"><span class="detail-label">総コメント数</span><span>'+cc+'件</span></div>'
      +'</div>';

    html += '<div style="background:var(--surface);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.06)">'
      +'<div class="section-title">アクティビティ履歴（直近10件）</div>';
    if (activity.length===0) {
      html += '<div style="color:var(--text-muted);font-size:12px;padding:8px 0">活動なし</div>';
    } else {
      html += activity.slice(0,10).map(ev => {
        const icon = ev.type==='vote'?'🗳':'💬';
        const act = ev.type==='vote'?'に投票':'にコメント';
        return '<div class="activity-item"><div class="activity-icon">'+icon+'</div><div class="activity-body">'
          +'<div class="activity-text"><span style="font-weight:500">'+esc(ev.name||'—')+'</span>'+act+'</div>'
          +'<div class="activity-time">'+relativeTime(ev.created_at)+'</div>'
          +'</div></div>';
      }).join('');
    }
    html += '</div>';
    document.getElementById('user-detail-body').innerHTML = html;

    // Mark messages from user as read
    await sb.from('admin_messages').update({is_read:true, read_at:new Date().toISOString()}).eq('from_user_id',userId).eq('to_user_id',ADMIN_UUID).eq('is_read',false).catch(()=>{});

    await loadUserMessages(userId);

    if (msgSub) { try { msgSub.unsubscribe(); } catch(e){} }
    msgSub = sb.channel('admin_chat_'+userId)
      .on('postgres_changes', {event:'INSERT', schema:'public', table:'admin_messages'}, async payload => {
        const msg = payload.new;
        const isOurs = (msg.from_user_id===userId&&msg.to_user_id===ADMIN_UUID)||(msg.from_user_id===ADMIN_UUID&&msg.to_user_id===userId);
        if (!isOurs) return;
        if (msg.sender_id !== ADMIN_UUID) appendAdminMessage(msg);
        if (msg.from_user_id===userId) {
          await sb.from('admin_messages').update({is_read:true, read_at:new Date().toISOString()}).eq('id',msg.id).catch(()=>{});
        }
      })
      .subscribe();
  } catch(e) {
    document.getElementById('user-detail-body').innerHTML = '<div style="padding:20px;color:var(--red)">読み込みに失敗しました</div>';
  }
}

async function loadUserMessages(userId) {
  try {
    const { data } = await sb.from('admin_messages').select('*')
      .or('and(from_user_id.eq.'+ADMIN_UUID+',to_user_id.eq.'+userId+'),and(from_user_id.eq.'+userId+',to_user_id.eq.'+ADMIN_UUID+')')
      .order('created_at', {ascending:true});
    const el = document.getElementById('user-messages-body');
    if (!el) return;
    el.innerHTML = '';
    (data||[]).forEach(msg => appendAdminMessage(msg));
  } catch(e) {}
}

function appendAdminMessage(msg) {
  const el = document.getElementById('user-messages-body');
  if (!el) return;
  const isAdmin = msg.from_user_id === ADMIN_UUID;
  const time = new Date(msg.created_at).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;align-items:'+(isAdmin?'flex-end':'flex-start')+';margin-bottom:10px';
  const readInfo = isAdmin
    ? (msg.is_read
        ? '<div style="font-size:9px;color:var(--text-muted);text-align:right;margin-top:2px">✓ 既読 '+(msg.read_at?new Date(msg.read_at).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}):'')+'</div>'
        : '<div style="font-size:9px;color:var(--text-muted);text-align:right;margin-top:2px">✓ 送信済み</div>')
    : '';
  wrap.innerHTML =
    '<div style="max-width:78%;padding:9px 13px;border-radius:'+(isAdmin?'16px 16px 4px 16px':'16px 16px 16px 4px')+';font-size:13px;line-height:1.5;word-break:break-word;background:'+(isAdmin?'var(--amber-mid)':'var(--surface)')+';color:'+(isAdmin?'#fff':'var(--text)')+';box-shadow:0 1px 4px rgba(0,0,0,.08)">'+esc(msg.text)+'</div>'
    +'<div style="font-size:9px;color:var(--text-muted);margin-top:3px">'+time+'</div>'
    +readInfo;
  el.appendChild(wrap);
  el.scrollTop = el.scrollHeight;
}

async function sendAdminMessage() {
  if (!currentDetailUserId) return;
  const inp = document.getElementById('msg-input');
  const text = inp?.value?.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = 'auto';
  const { data, error } = await sb.from('admin_messages').insert({
    from_user_id: ADMIN_UUID,
    to_user_id: currentDetailUserId,
    text,
    is_read: false,
  }).select().single();
  if (error) { showDashToast('送信に失敗しました'); return; }
  if (data) appendAdminMessage(data);
}

function closeUserDetail() {
  document.getElementById('user-detail-modal').style.display = 'none';
  if (msgSub) { try { msgSub.unsubscribe(); } catch(e){} msgSub = null; }
  currentDetailUserId = null;
  if (currentTab === 1) loadUsers();
}

// ══ Tab 2: ログ ════════════════════════════════════════

async function loadLog(filter) {
  logFilter = filter || 'all';
  ['all','vote','comment','idea'].forEach(f => {
    const btn = document.getElementById('log-filter-'+f);
    if (btn) btn.classList.toggle('active', f===logFilter);
  });
  const el = document.getElementById('log-list');
  el.innerHTML = '<span class="skeleton-line" style="width:100%"></span><span class="skeleton-line" style="width:90%"></span>';
  try {
    const want = f => logFilter==='all'||logFilter===f;
    const [vR, cR, iR] = await Promise.all([
      want('vote')    ? sb.from('votes').select('user_id,idea_id,created_at,ideas(name)').order('created_at',{ascending:false}).limit(50) : Promise.resolve({data:[]}),
      want('comment') ? sb.from('comments').select('user_id,idea_id,created_at,ideas(name)').order('created_at',{ascending:false}).limit(50) : Promise.resolve({data:[]}),
      want('idea')    ? sb.from('ideas').select('user_id,name,created_at').order('created_at',{ascending:false}).limit(50) : Promise.resolve({data:[]}),
    ]);
    const events = [];
    (vR.data||[]).forEach(v => events.push({type:'vote',    user_id:v.user_id, name:v.ideas?.name||v.idea_id, created_at:v.created_at}));
    (cR.data||[]).forEach(c => events.push({type:'comment', user_id:c.user_id, name:c.ideas?.name||c.idea_id, created_at:c.created_at}));
    (iR.data||[]).forEach(i => events.push({type:'idea',    user_id:i.user_id, name:i.name,                  created_at:i.created_at}));
    events.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    const items = events.slice(0,50);
    if (items.length===0) { el.innerHTML='<div style="color:var(--text-muted);font-size:12px;padding:12px 0">ログなし</div>'; return; }
    const icons   = {vote:'🗳', comment:'💬', idea:'💡'};
    const actions = {vote:'に投票', comment:'にコメント', idea:'を上場'};
    el.innerHTML = items.map(ev =>
      '<div class="activity-item">'
      +'<div class="activity-icon">'+icons[ev.type]+'</div>'
      +'<div class="activity-body">'
      +'<div class="activity-text"><span class="activity-user">'+(ev.user_id?ev.user_id.slice(0,8):'匿名')+'</span> が <span class="activity-idea" title="'+esc(ev.name||'—')+'">'+esc(ev.name||'—')+'</span>'+actions[ev.type]+'</div>'
      +'<div class="activity-time">'+relativeTime(ev.created_at)+'</div>'
      +'</div></div>'
    ).join('');
  } catch(e) { el.innerHTML='<span class="error-text">取得失敗</span>'; }
}

// ── Init ──────────────────────────────────────────────────
(async function() {
  const ok = await authGuard();
  if (!ok) return;
  await loadAll();
})();
